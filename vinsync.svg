<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="vGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#0a0a0a" stroke="url(#vGrad)" stroke-width="8"/>
  <!-- Inner glow circle -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#vGrad2)" stroke-width="1" opacity="0.3"/>
  <!-- VinSync "V" monogram - stylized play button V -->
  <g filter="url(#glow)">
    <path d="M180 180 L256 340 L332 180" fill="none" stroke="url(#vGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Sound waves emanating from V -->
    <path d="M220 200 Q240 230 240 256 Q240 282 220 312" fill="none" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
    <path d="M200 180 Q230 220 230 256 Q230 292 200 332" fill="none" stroke="#3b82f6" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    <path d="M312 200 Q292 230 292 256 Q292 282 312 312" fill="none" stroke="#06b6d4" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
    <path d="M332 180 Q302 220 302 256 Q302 292 332 332" fill="none" stroke="#3b82f6" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
  </g>
  <!-- Small decorative dots -->
  <circle cx="180" cy="400" r="4" fill="#06b6d4" opacity="0.5"/>
  <circle cx="210" cy="420" r="3" fill="#3b82f6" opacity="0.3"/>
  <circle cx="332" cy="400" r="4" fill="#06b6d4" opacity="0.5"/>
  <circle cx="302" cy="420" r="3" fill="#3b82f6" opacity="0.3"/>
</svg>